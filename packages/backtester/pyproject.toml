[project]
name = "backtester"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "utils",
    "polars",
    "numpy>=2.4.2",
    "tqdm>=4.67.3",
]

[tool.uv.sources]
utils = { workspace = true }

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
