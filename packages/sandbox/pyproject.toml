[project]
name = "sandbox"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "utils",
    "backtester",
    "ipykernel",
    "matplotlib>=3.10.8",
    "ipdb>=0.13.13",
]

[tool.uv.sources]
utils = { workspace = true }
backtester = { workspace = true }

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"
