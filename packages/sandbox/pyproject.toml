[project]
name = "sandbox"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "utils",
    "backtester",
    "ipykernel",
    "matplotlib>=3.10.8",
    "ipdb>=0.13.13",
    "pandas>=3.0.1",
    "pyarrow>=23.0.1",
]

[tool.uv.sources]
utils = { workspace = true }
backtester = { workspace = true }

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"
